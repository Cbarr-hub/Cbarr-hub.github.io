<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KPI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;padding:20px;max-width:calc(100% - 400px);margin:auto}
    h1{margin-bottom:6px}
    table{border-collapse:collapse;width:100%;margin-top:12px}
    th,td{border:1px solid #ddd;padding:8px;text-align:left}
    th{background:#f4f4f4}
    details{margin-left:16px;margin-top:6px}
    summary{cursor:pointer;font-weight:600;display:flex;align-items:center;gap:0.5em}
    .tree-button{font-size:0.85em;padding:2px 6px;border:1px solid #999;border-radius:4px;background:#f4f4f4;cursor:pointer}
    .tree-button:hover{background:#e8e8e8}
    .ok{color:green}.warn{color:darkorange}.bad{color:crimson}
    pre{white-space:pre-wrap;background:#f9f9f9;padding:10px;border:1px solid #eee}
    #video-panel{position:fixed;right:0;top:0;width:400px;height:100vh;background:#000;display:flex;flex-direction:column;box-shadow:-2px 0 8px rgba(0,0,0,0.3);z-index:1000}
    #video-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border:none;background:#fff;color:#000;font-size:1.5em;cursor:pointer;border-radius:4px;z-index:1001}
    #video-close:hover{background:#eee}
    #video-container{flex:1;display:flex;align-items:center;justify-content:center}
    #video-container iframe{width:100%;height:100%;border:none}
  </style>
</head>
<body>
  <h1>KPI Dashboard — Quirky HTML Metrics</h1>
  <p>Scans the site pages and reports unusual/interesting HTML statistics.</p>

  <h2>Site Crawler</h2>
  <div>
    <label>Start path (relative):</label>
    <input id="startPath" style="width:60%" value="index.html">
    <label style="margin-left:8px">Max pages:</label>
    <input id="maxPages" type="number" min="1" value="50" style="width:80px">
    <button id="crawl">Crawl site</button>
    <span id="crawlStatus"></span>
  </div>
  <div id="tree" style="margin-top:12px"></div>

  <div>
    <label>Pages to scan (comma-separated):</label>
    <input id="pagesInput" style="width:100%" value="">
  </div>
  <p><button id="run">Run scan</button> <span id="status"></span></p>

  <div id="summary"></div>
  <div id="keyMetrics"></div>
  <div style="width:500px;height:350px;margin:20px 0">
    <canvas id="wordCountChart"></canvas>
  </div>
  <div style="width:600px;height:350px;margin:20px 0">
    <canvas id="readabilityChart"></canvas>
  </div>

  <h3>Detailed Analytics</h3>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin:20px 0">
    <div style="width:100%;height:300px"><canvas id="sentenceCountChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="avgWordLengthChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="imageCountChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="scriptCountChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="metaCountChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="commentCountChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="domDepthChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="inlineStylesChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="wordDiversityChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="missingAltChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="externalLinksChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="duplicateIDsChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="h1CountChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="h2CountChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="totalHeadingsChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="longestWordLengthChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="avgSentenceLengthChart"></canvas></div>
    <div style="width:100%;height:300px"><canvas id="headingsBreakdownChart"></canvas></div>
  </div>

  <div id="pageDetails"></div>
  <div id="results"></div>

  <div id="video-panel">
    <button id="video-close" type="button">×</button>
    <div id="video-container">
      <iframe src="https://www.youtube.com/embed/-DX_9sF4i00?autoplay=1" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>

  <script>
  // List of quirky metrics we'll compute for each page.
  const metricsCache = new Map();
  function computeMetrics(text, doc, url) {
    const bodyText = (doc && doc.body) ? doc.body.textContent || '' : text.replace(/<[^>]+>/g,' ');
    const words = (bodyText.match(/\b[\w'-]+\b/g) || []).filter(Boolean);
    const sentences = (bodyText.split(/[.!?]+/).map(s=>s.trim()).filter(Boolean));

    const imgs = Array.from((doc && doc.images) ? doc.images : []);
    const anchors = Array.from((doc && doc.links) ? doc.links : []);

    // duplicate IDs
    const ids = Array.from(doc.querySelectorAll('[id]')).map(n=>n.id);
    const dupIDs = ids.filter((v,i,a)=>a.indexOf(v)!==i);

    // inline styles count
    const inlineStyleCount = doc.querySelectorAll('[style]').length;

    // comments
    const comments = (text.match(/<!--([\s\S]*?)-->/g) || []).length;

    // external links
    const externalLinks = anchors.filter(a=>{
      try{const u=new URL(a.href, location.href); return u.hostname !== location.hostname}catch(e){return false}
    });

    // longest word (excluding HTML-like words)
    let longest = '';
    for(const w of words){
      if(/[<>\/\&]/.test(w)) continue; // skip HTML-like words
      if(w.length>longest.length) longest=w;
    }

    // compute DOM max depth
    function maxDepth(node){
      if(!node || !node.children || node.children.length===0) return 1;
      let m=0; for(const c of node.children) m=Math.max(m, maxDepth(c)); return m+1;
    }

    const headings = [1,2,3,4,5,6].reduce((acc,n)=>{acc['h'+n]=doc.querySelectorAll('h'+n).length;return acc},{})

    // Readability: Flesch-Kincaid Grade Level
    const syllables = (text) => {
      const word = text.toLowerCase();
      let count = 0;
      let vowels = 'aeiouy';
      let prevWasVowel = false;
      for(const char of word){
        const isVowel = vowels.includes(char);
        if(isVowel && !prevWasVowel) count++;
        prevWasVowel = isVowel;
      }
      if(word.endsWith('e')) count--;
      if(word.endsWith('le') && word.length > 2) count++;
      return Math.max(1, count);
    };
    let totalSyllables = 0;
    for(const w of words) totalSyllables += syllables(w);
    const avgSyllablesPerWord = words.length ? totalSyllables / words.length : 0;
    const readabilityScore = sentences.length && words.length ? 
      0.39 * (words.length / sentences.length) + 11.8 * avgSyllablesPerWord - 15.59 : 0;

    // Word diversity ratio
    const uniqueWords = new Set(words.map(w=>w.toLowerCase())).size;
    const wordDiversity = words.length ? (uniqueWords / words.length).toFixed(3) : 0;

    return {
      url,
      wordCount: words.length,
      avgWordLen: words.length? (words.reduce((s,w)=>s+w.length,0)/words.length).toFixed(2):0,
      longestWord: longest,
      sentenceCount: sentences.length,
      avgSentenceWords: sentences.length? (words.length/sentences.length).toFixed(2):0,
      readabilityScore: readabilityScore.toFixed(1),
      wordDiversity,
      inlineStyleCount,
      comments,
      imgsTotal: imgs.length,
      imgsMissingAlt: imgs.filter(i=>!i.alt||i.alt.trim()==='').length,
      scriptCount: doc.scripts.length,
      metaCount: doc.querySelectorAll('meta').length,
      externalLinks: externalLinks.length,
      duplicateIDs: Array.from(new Set(dupIDs)),
      domMaxDepth: maxDepth(doc.body),
      headings
    };
  }

  async function fetchPage(url){
    const res = await fetch(url, {cache:'no-store'}).catch(e=>null);
    if(!res || !res.ok) throw new Error('Fetch failed: '+url);
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');
    return {text, doc, url};
  }

  // --- CRAWLER: discover pages (same-origin) and build a tree ---
  async function crawlSite(startPath, maxPages = 50){
    const origin = location.origin;
    const toAbsolute = p => new URL(p, location.href).href;
    const normalize = (href, base) => {
      try{
        const baseAbs = new URL(base, location.href);
        const u = new URL(href, baseAbs);
        if(u.origin !== origin) return null;
        let p = (u.pathname + u.search + u.hash) || '/';
        if(p.startsWith('/')) p = p.slice(1);
        if(!p) p = 'index.html';
        return p;
      }catch(e){ return null }
    };

    const seen = new Map(); // path -> node {url, children: [], parent: null}
    function makeNode(path){ if(!seen.has(path)) seen.set(path, {url:path, children:[], parent:null}); return seen.get(path); }

    const q = [];
    makeNode(startPath);
    q.push(startPath);

    while(q.length && seen.size < maxPages){
      const cur = q.shift();
      const node = makeNode(cur);
      try{
        const {text, doc} = await fetchPage(cur);
        // cache metrics
        metricsCache.set(cur, computeMetrics(text, doc, cur));
        const anchors = Array.from(doc.querySelectorAll('a[href]')).map(a=>a.getAttribute('href'));
        for(const a of anchors){
          const np = normalize(a, cur);
          if(!np) continue;
          if(!seen.has(np) && !q.includes(np)) q.push(np);
          const child = makeNode(np);
          if(child.parent === null && np !== startPath) child.parent = cur;
          if(!node.children.includes(np)) node.children.push(np);
        }
      }catch(e){
        metricsCache.set(cur, {error: e.message, url: cur});
      }
    }

    const roots = Array.from(seen.values()).filter(n=>!n.parent);
    return {seen, roots};
  }

  function renderTree(roots){
    const rootEl = document.getElementById('tree');
    if(!roots || roots.length===0){ rootEl.innerHTML = '<em>No pages discovered</em>'; return }
    const seenMap = window.__kpi_seen || new Map();
    rootEl.innerHTML = '';

    const build = (node, visited) => {
      const details = document.createElement('details');
      const summary = document.createElement('summary');
      const title = document.createElement('span');
      title.textContent = node.url;
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'tree-button';
      button.textContent = 'view metrics';
      button.addEventListener('click', (e)=>{ e.stopPropagation(); showNodeMetrics(node.url); });
      summary.appendChild(title);
      summary.appendChild(button);
      details.appendChild(summary);

      if(node.children && node.children.length){
        if(visited.has(node.url)){
          const note = document.createElement('div');
          note.textContent = 'cycle detected';
          note.style.color = 'crimson';
          note.style.marginLeft = '1em';
          details.appendChild(note);
          return details;
        }
        const nextVisited = new Set(visited);
        nextVisited.add(node.url);
        for(const c of node.children){
          const childNode = seenMap.get(c) || {url:c, children:[]};
          details.appendChild(build(childNode, nextVisited));
        }
      }
      return details;
    };

    for(const r of roots){
      rootEl.appendChild(build(r, new Set()));
    }
  }

  function showNodeMetrics(url){
    const m = metricsCache.get(url);
    const out = document.getElementById('results');
    if(!m){ out.innerHTML = `<p>No metrics for ${url}</p>`; return }
    if(m.error){ out.innerHTML = `<p>Error fetching ${url}: ${m.error}</p>`; return }
    out.innerHTML = `<h3>Metrics: ${url}</h3><pre>${JSON.stringify(m, null, 2)}</pre>`;
  }

  // Crawl button handler
  document.getElementById('crawl').addEventListener('click', async ()=>{
    const status = document.getElementById('crawlStatus');
    const start = document.getElementById('startPath').value.trim() || 'index.html';
    const max = parseInt(document.getElementById('maxPages').value,10) || 50;
    status.textContent = 'Crawling...';
    try{
      const {seen, roots} = await crawlSite(start, max);
      window.__kpi_seen = seen;
      renderTree(roots);
      const pageList = Array.from(seen.keys()).join(',');
      document.getElementById('pagesInput').value = pageList;
      status.textContent = `Crawled ${seen.size} pages and updated scan list.`;
      const metrics = Array.from(metricsCache.entries()).map(([k,v])=> v.error ? {url:k, error:v.error} : v);
      const good = metrics.filter(m=>!m.error);
      renderKeyMetrics(good);
      renderPageDetails(metrics);
      renderWordCountChart(good);
      renderReadabilityChart(good);
      renderSentenceCountChart(good);
      renderAvgWordLengthChart(good);
      renderImageCountChart(good);
      renderScriptCountChart(good);
      renderMetaCountChart(good);
      renderCommentCountChart(good);
      renderDomDepthChart(good);
      renderInlineStylesChart(good);
      renderWordDiversityChart(good);
      renderMissingAltChart(good);
      renderExternalLinksChart(good);
      renderDuplicateIDsChart(good);
      renderH1CountChart(good);
      renderH2CountChart(good);
      renderTotalHeadingsChart(good);
      renderLongestWordLengthChart(good);
      renderAvgSentenceLengthChart(good);
      renderHeadingsBreakdownChart(good);
    }catch(e){ status.textContent = 'Crawl failed: '+e.message }
  });

  function renderKeyMetrics(metricsList){
    const out = document.getElementById('keyMetrics');
    if(metricsList.length===0){ out.innerHTML = ''; return }
    let html = '<h3>Key metrics</h3><table><thead><tr><th>Page</th><th>Words</th><th>Average sentence length</th><th>Longest word</th><th>Sentences</th><th>Flesch-Kincaid Readability score</th><th>Word diversity</th></tr></thead><tbody>';
    for(const m of metricsList){
      html += `<tr><td><a href="${m.url}" target="_blank">${m.url}</a></td><td>${m.wordCount}</td><td>${m.avgSentenceWords}</td><td>${escapeHtml(m.longestWord)}</td><td>${m.sentenceCount}</td><td>${m.readabilityScore}</td><td>${m.wordDiversity}</td></tr>`;
    }
    html += '</tbody></table>';
    out.innerHTML = html;
  }

  function renderPageDetails(metricsList){
    const out = document.getElementById('pageDetails');
    if(metricsList.length===0){ out.innerHTML = ''; return }
    const parts = ['<h3>Page details</h3>'];
    for(const m of metricsList){
      if(m.error){
        parts.push(`<details><summary>${escapeHtml(m.url)} — error</summary><div style="padding:8px 12px;color:#900">${escapeHtml(m.error)}</div></details>`);
        continue;
      }
      const duplicateInfo = m.duplicateIDs.length ? `${m.duplicateIDs.length} (${escapeHtml(m.duplicateIDs.join(', '))})` : '0';
      parts.push(`
        <details>
          <summary>${escapeHtml(m.url)}</summary>
          <table>
            <tbody>
              <tr><th>Word count</th><td>${m.wordCount}</td></tr>
              <tr><th>Avg word length</th><td>${m.avgWordLen}</td></tr>
              <tr><th>Longest word</th><td>${escapeHtml(m.longestWord)}</td></tr>
              <tr><th>Sentence count</th><td>${m.sentenceCount}</td></tr>
              <tr><th>Average sentence length</th><td>${m.avgSentenceWords}</td></tr>
              <tr><th>Readability score (FK)</th><td>${m.readabilityScore}</td></tr>
              <tr><th>Word diversity ratio</th><td>${m.wordDiversity}</td></tr>
              <tr><th>Inline styles</th><td>${m.inlineStyleCount}</td></tr>
              <tr><th>Comment count</th><td>${m.comments}</td></tr>
              <tr><th>Images</th><td>${m.imgsTotal}</td></tr>
              <tr><th>Missing alt</th><td>${m.imgsMissingAlt}</td></tr>
              <tr><th>Scripts</th><td>${m.scriptCount}</td></tr>
              <tr><th>Meta tags</th><td>${m.metaCount}</td></tr>
              <tr><th>External links</th><td>${m.externalLinks}</td></tr>
              <tr><th>Duplicate IDs</th><td>${duplicateInfo}</td></tr>
              <tr><th>DOM max depth</th><td>${m.domMaxDepth}</td></tr>
              <tr><th>Headings</th><td>h1:${m.headings.h1} h2:${m.headings.h2} h3:${m.headings.h3} h4:${m.headings.h4} h5:${m.headings.h5} h6:${m.headings.h6}</td></tr>
            </tbody>
          </table>
        </details>
      `);
    }
    out.innerHTML = parts.join('');
  }

  function renderTable(metricsList){
    renderKeyMetrics(metricsList);
    renderPageDetails(metricsList);
    renderWordCountChart(metricsList);
    renderReadabilityChart(metricsList);
  }

  function renderWordCountChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('wordCountChart');
    if(!canvas) return;
    // Destroy previous chart if exists
    if(window.__wordCountChart) window.__wordCountChart.destroy();
    
    const labels = metricsList.map(m=>m.url.substring(0,20));
    const data = metricsList.map(m=>m.wordCount);
    const colors = metricsList.map((_, i) => `hsl(${(i * 360 / metricsList.length)}, 70%, 60%)`);
    
    const ctx = canvas.getContext('2d');
    window.__wordCountChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{data, backgroundColor: colors, borderColor: '#fff', borderWidth: 2}]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {position: 'bottom', labels: {font: {size: 11}}}
        }
      }
    });
  }

  function renderReadabilityChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('readabilityChart');
    if(!canvas) return;
    // Destroy previous chart if exists
    if(window.__readabilityChart) window.__readabilityChart.destroy();
    
    const labels = metricsList.map(m=>m.url.substring(0,20));
    const data = metricsList.map(m=>parseFloat(m.readabilityScore));
    
    const ctx = canvas.getContext('2d');
    window.__readabilityChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'FK Grade Level',
          data,
          backgroundColor: 'rgba(75, 192, 192, 0.7)',
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 1
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {legend: {display: true, labels: {font: {size: 11}}}},
        scales: {x: {beginAtZero: true, ticks: {font: {size: 10}}}, y: {ticks: {font: {size: 10}}}}
      }
    });
  }

  // Line chart for sentence count
  function renderSentenceCountChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('sentenceCountChart');
    if(!canvas) return;
    if(window.__sentenceCountChart) window.__sentenceCountChart.destroy();
    const labels = metricsList.map(m=>m.url.substring(0,15));
    const data = metricsList.map(m=>m.sentenceCount);
    window.__sentenceCountChart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {labels, datasets: [{label: 'Sentences', data, borderColor: 'rgba(255,99,132,1)', borderWidth: 2, fill: false}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {font: {size: 10}}}}, scales: {y: {beginAtZero: true}}}
    });
  }

  function renderAvgWordLengthChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('avgWordLengthChart');
    if(!canvas) return;
    if(window.__avgWordLengthChart) window.__avgWordLengthChart.destroy();
    const labels = metricsList.map(m=>m.url.substring(0,15));
    const data = metricsList.map(m=>parseFloat(m.avgWordLen));
    window.__avgWordLengthChart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {labels, datasets: [{label: 'Avg word length', data, borderColor: 'rgba(54,162,235,1)', borderWidth: 2, fill: false}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {font: {size: 10}}}}}
    });
  }

  function renderImageCountChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('imageCountChart');
    if(!canvas) return;
    if(window.__imageCountChart) window.__imageCountChart.destroy();
    const labels = metricsList.map(m=>m.url.substring(0,15));
    const data = metricsList.map(m=>m.imgsTotal);
    window.__imageCountChart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: {labels, datasets: [{label: 'Images', data, backgroundColor: 'rgba(255,159,64,0.7)', borderColor: 'rgba(255,159,64,1)', borderWidth: 1}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {font: {size: 10}}}}, scales: {y: {beginAtZero: true}}}
    });
  }

  function renderScriptCountChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('scriptCountChart');
    if(!canvas) return;
    if(window.__scriptCountChart) window.__scriptCountChart.destroy();
    const labels = metricsList.map(m=>m.url.substring(0,15));
    const data = metricsList.map(m=>m.scriptCount);
    window.__scriptCountChart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: {labels, datasets: [{label: 'Scripts', data, backgroundColor: 'rgba(153,102,255,0.7)', borderColor: 'rgba(153,102,255,1)', borderWidth: 1}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {font: {size: 10}}}}, scales: {y: {beginAtZero: true}}}
    });
  }

  function renderMetaCountChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('metaCountChart');
    if(!canvas) return;
    if(window.__metaCountChart) window.__metaCountChart.destroy();
    const labels = metricsList.map(m=>m.url.substring(0,15));
    const data = metricsList.map(m=>m.metaCount);
    window.__metaCountChart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {labels, datasets: [{label: 'Meta tags', data, borderColor: 'rgba(75,192,192,1)', borderWidth: 2, fill: false, tension: 0.3}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {font: {size: 10}}}}, scales: {y: {beginAtZero: true}}}
    });
  }

  function renderCommentCountChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('commentCountChart');
    if(!canvas) return;
    if(window.__commentCountChart) window.__commentCountChart.destroy();
    const labels = metricsList.map(m=>m.url.substring(0,15));
    const data = metricsList.map(m=>m.comments);
    window.__commentCountChart = new Chart(canvas.getContext('2d'), {
      type: 'bar',
      data: {labels, datasets: [{label: 'Comments', data, backgroundColor: 'rgba(201,203,207,0.7)', borderColor: 'rgba(201,203,207,1)', borderWidth: 1}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {font: {size: 10}}}}, scales: {y: {beginAtZero: true}}}
    });
  }

  function renderDomDepthChart(metricsList){
    if(metricsList.length===0) return;
    const canvas = document.getElementById('domDepthChart');
    if(!canvas) return;
    if(window.__domDepthChart) window.__domDepthChart.destroy();
    const labels = metricsList.map(m=>m.url.substring(0,15));
    const data = metricsList.map(m=>m.domMaxDepth);
    window.__domDepthChart = new Chart(canvas.getContext('2d'), {

  function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

  // Video close button
  document.getElementById('video-close').addEventListener('click', ()=>{

  });

  document.getElementById('run').addEventListener('click', async ()=>{
    const status = document.getElementById('status'); status.textContent='Scanning...';
    const raw = document.getElementById('pagesInput').value.split(',').map(s=>s.trim()).filter(Boolean);
    const results = [];
    for(const p of raw){
      try{
        const {text,doc,url} = await fetchPage(p);
        results.push(computeMetrics(text, doc, p));
      }catch(e){
        results.push({url:p, error: e.message});
      }
    }
    status.textContent='Done';
    // show summary
    document.getElementById('summary').innerHTML = `<p>Scanned ${results.length} pages.</p>`;
    const metrics = results;
    const good = metrics.filter(r=>!r.error);
    renderKeyMetrics(good);
    renderPageDetails(metrics);
    renderWordCountChart(good);
    renderReadabilityChart(good);
    renderSentenceCountChart(good);
    renderAvgWordLengthChart(good);
    renderImageCountChart(good);
    renderScriptCountChart(good);
    renderMetaCountChart(good);

    renderWordDiversityChart(good);

    renderExternalLinksChart(good);
    renderDuplicateIDsChart(good);
    renderH1CountChart(good);
    renderH2CountChart(good);
    renderTotalHeadingsChart(good);
    renderLongestWordLengthChart(good);
    renderAvgSentenceLengthChart(good);
    renderHeadingsBreakdownChart(good);
    // show raw errors
    const errs = metrics.filter(r=>r.error);
    if(errs.length){
      const eout = errs.map(e=>`<li>${e.url}: ${e.error}</li>`).join('');
      document.getElementById('results').innerHTML = '<h3>Errors</h3><ul>'+eout+'</ul>';
    } else {
      document.getElementById('results').innerHTML = '';
    }
  });
  </script>
