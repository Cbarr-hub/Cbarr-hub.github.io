<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablets :: Gamertown Solutions</title>
  <style>
    * { box-sizing: border-box; }
    html { background: #020403; }
    body {
      margin: 0;
      color: #e8eee8;
      background: #020403;
      font: 16px/1.65 "Courier New", Courier, monospace;
      letter-spacing: .01em;
    }

    .topbar {
      height: 42px;
      background: #f2f4ef;
      color: #050605;
      padding: 8px 12px;
      font-weight: 700;
      letter-spacing: .05em;
      box-shadow: 0 0 22px rgba(255, 20, 147, .18);
    }

    a { color: #ff1493; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: #fff; background: #3d0020; }

    .page-shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 42px 100px;
      background: radial-gradient(circle at 50% 18%, rgba(255, 20, 147, .07), transparent 38%);
      min-height: calc(100vh - 42px);
    }

    .title-block {
      text-align: center;
      margin-bottom: 52px;
    }

    .title-block h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 46px;
      font-weight: 400;
      letter-spacing: .48em;
      color: #ff1493;
      margin: 0 0 10px;
    }

    .title-block .sub {
      color: #cc7aaa;
      font-size: 13px;
      letter-spacing: .14em;
    }

    hr {
      border: 0;
      border-top: 1px solid rgba(255, 20, 147, .4);
      margin: 0 0 40px;
    }

    .content-section {
      max-width: 620px;
      margin: 0 auto;
    }

    .content-section h3 {
      font-weight: 400;
      font-size: 16px;
      color: #ff6eb4;
      margin: 0 0 14px;
    }

    .content-section p {
      color: #d6ccd6;
      margin: 0 0 18px;
      line-height: 1.75;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 64px;
      font-size: 13px;
      letter-spacing: .06em;
      color: #cc7aaa;
      text-decoration: none;
    }

    .back-link:hover { color: #fff; background: none; }

    @media (max-width: 640px) {
      .page-shell { padding: 48px 22px 72px; }
      .title-block h1 { font-size: 32px; letter-spacing: .28em; }
    }
  </style>
</head>
<body>
  <div class="topbar">GAMERTOWN SOLUTIONS // TABLETS</div>
  <main class="page-shell">

    <div class="title-block">
      <h1>TABLETS</h1>
      <div class="sub">// inscriptions / damp records //</div>
    </div>

    <hr />

    <section class="content-section">
      <h3>//CONTENTS</h3>
      <p>
        &nbsp;
      </p>
    </section>

    <a href="index.html" class="back-link">← return to index</a>

  </main>

  <script type="module">
    import { requireAuth, updateNavbar, getSession } from './auth.js';
    requireAuth();
    updateNavbar(getSession());
  </script>
</body>
</html>
