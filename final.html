<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Final Solution</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f0 0%, #fff0c2 50%, #d0f0ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* floating hearts background */
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -60px;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.6;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 48px 56px;
      box-shadow: 0 8px 40px rgba(255, 100, 150, 0.25), 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      max-width: 480px;
      width: 90%;
      border: 2px solid rgba(255,182,210,0.5);
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #e05080;
      text-align: center;
      line-height: 1.3;
      text-shadow: 2px 2px 0 #fff0f5;
    }

    .photo-wrap {
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, #ff9ec4, #ffda7a, #a0d8ff);
      box-shadow: 0 4px 20px rgba(255,100,150,0.3);
    }
    .photo-wrap img {
      display: block;
      width: 380px;
      height: 380px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
    }

    p {
      font-size: 1.15rem;
      color: #c0406a;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .sparkles {
      font-size: 1.6rem;
      letter-spacing: 0.3em;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   }
      50%       { transform: scale(1.18); }
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="card">
    <div class="sparkles">&#10024; &#10084;&#65039; &#10024;</div>
    <div class="photo-wrap">
      <img src="boyLove.png" alt="boy love">
    </div>
    <h1>The Final Solution is Love</h1>
    <p>you made it here &mdash; that means something &#128149;</p>
    <div class="sparkles">&#127800; &#128149; &#127800;</div>
  </div>

  <script>
    const emojis = ['❤️','💛','💚','💙','💜','🌸','✨','💖','🌼','💫']
    const container = document.getElementById('hearts')
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('span')
      el.className = 'heart'
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)]
      el.style.left = Math.random() * 100 + 'vw'
      el.style.fontSize = (1 + Math.random() * 1.5) + 'rem'
      el.style.animationDuration = (6 + Math.random() * 10) + 's'
      el.style.animationDelay = (Math.random() * 10) + 's'
      container.appendChild(el)
    }
  </script>

</body>
</html>
