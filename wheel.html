<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Spinner</title>
  <link rel="stylesheet" href="wheel.css">
  <link rel="stylesheet" href="site-tabs.css" />
  <script src="site-tabs.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="glitch-header">
      <h1 class="glitch" data-text="GAME SPINNER">GAME SPINNER</h1>
      <p class="sub">Spin the slot to choose a random game from the database.</p>
    </header>

    <div class="slot-frame" aria-label="Horizontal slot game spinner">
      <div class="slot-window">
        <div id="slotTrack" class="slot-track" aria-live="polite">
          <div class="no-names">Choose filters, then press Spin.</div>
        </div>
        <div class="slot-highlight" aria-hidden="true"></div>
      </div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label for="player-count"><span>Players</span></label>
        <input id="player-count" type="number" min="1" placeholder="Enter player count" />
      </div>
      <div class="filter-group">
        <span>Time</span>
        <label for="time-30"><input id="time-30" type="checkbox" value="&lt;30" checked> &lt;30 minutes</label>
        <label for="time-60"><input id="time-60" type="checkbox" value="&lt;60" checked> &lt;1 hour</label>
        <label for="time-none"><input id="time-none" type="checkbox" value="no limit" checked> No limit</label>
      </div>
    </div>

    <div class="controls">
      <button id="spin" type="button">Spin</button>
    </div>

    <div class="result-card">
      <p>Selected game:</p>
      <strong id="result">Ready to spin</strong>
    </div>

    <p class="note">Use the filters to narrow the game list, then press spin.</p>
    <p class="return"><a href="index.html">&laquo; Back to home</a></p>
  </div>

  <div id="popupModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="modal">
      <h2 id="popupTitle">Game Selected</h2>
      <p>The slot chose:</p>
      <p class="popup-name" id="popupName">Ready</p>
      <button class="modal-close" type="button" id="closePopup">Close</button>
    </div>
  </div>

  <script type="module">
    let supabase;
    const slotColors = ['blue', 'purple', 'pink', 'red', 'gold'];
    const slotColorMap = {
      blue: '#007bff',
      purple: '#7a3fff',
      pink: '#ff4fb3',
      red: '#ff3b3b',
      gold: '#ffbf38'
    };
    const overlayColorMap = {
      blue: 'rgba(0,123,255,0.64)',
      purple: 'rgba(122,63,255,0.64)',
      pink: 'rgba(255,79,179,0.64)',
      red: 'rgba(255,59,59,0.64)',
      gold: 'rgba(255,191,56,0.64)'
    };
    // CS2 Case odds (Mil-Spec/Blue, Restricted/Purple, Classified/Pink, Covert/Red, Knife/Gold)
    const cs2Odds = {
      blue: 0.796,    // ~79.6% (Mil-Spec)
      purple: 0.1598, // ~16% (Restricted)
      pink: 0.032,    // ~3.2% (Classified)
      red: 0.010,     // ~1% (Covert)
      gold: 0.0062    // ~0.62% (Knife/Special)
    };
    const spinButton = document.getElementById('spin');
    const resultDisplay = document.getElementById('result');
    const slotTrack = document.getElementById('slotTrack');
    const playerCountInput = document.getElementById('player-count');
    const filterInputs = document.querySelectorAll('.filters input');
    let allGames = [
      { id: 1, name: 'Lethal Company', minplayers: 4, maxplayers: 6, timeMinutes: 45 },
      { id: 2, name: 'Lockdown Protocol', players: 2, timeMinutes: 20 },
      { id: 3, name: 'RV There Yet', maxplayers: 2, timeMinutes: null },
      { id: 4, name: 'Goofy Gorillas', minplayers: 4, timeMinutes: 25 },
      { id: 5, name: 'Super Battle Golf', players: 2, timeMinutes: 50 },
      { id: 6, name: 'CSGO', maxplayers: 5, timeMinutes: 40 },
      { id: 7, name: 'Buckshot Roulette', players: 4, timeMinutes: 55 },
      { id: 8, name: 'Peak', maxplayers: 2, timeMinutes: 45 },
      { id: 9, name: 'Gamble With Your Friends', maxplayers: 6, timeMinutes: null },
      { id: 10, name: 'Rocket League', maxplayers: 6, timeMinutes: 35 },
      { id: 11, name: 'Halo', maxplayers: 6, timeMinutes: 55 },
      { id: 12, name: 'Risk of Rain', maxplayers: 4, timeMinutes: 90 },
      { id: 13, name: 'Just Another Night Shift', maxplayers: 4, timeMinutes: 70 },
      { id: 14, name: 'League of Legends', maxplayers: 6, timeMinutes: 80 },
      { id: 15, name: 'Age of Empires', maxplayers: 6, timeMinutes: null },
      { id: 16, name: 'Last Train Out of Wormtown', maxplayers: 6, timeMinutes: 55 },
      { id: 17, name: 'Oh Deer', maxplayers: 4, timeMinutes: 65 }
    ];
    let selectedPlayerCount = null;
    let selectedTimes = [];
    let isSpinning = false;
    const spinDuration = 6000;

    async function initPage() {
      try {
        const authModule = await import('./auth.js');
        authModule.requireAuth();
        authModule.updateNavbar(authModule.getSession());
      } catch (error) {
        console.warn('Auth import failed:', error);
      }

      try {
        const supabaseModule = await import('./supabase-client.js');
        supabase = supabaseModule.supabase;
      } catch (error) {
        console.warn('Supabase import failed:', error);
      }

      await loadGames();
    }

    function setSlotMessage(message) {
      slotTrack.innerHTML = '';
      const messageEl = document.createElement('div');
      messageEl.className = 'no-names';
      messageEl.textContent = message;
      slotTrack.appendChild(messageEl);
      slotTrack.style.transition = 'none';
      slotTrack.style.transform = 'translateX(0)';
    }

    function normalizeGame(row) {
      const players = Number(row.players);
      const minplayers = Number(row.minplayers);
      const maxplayers = Number(row.maxplayers);
      const timeMinutes = Number(row.time_minutes);
      return {
        id: row.id,
        name: row.name,
        players: Number.isFinite(players) ? players : null,
        minplayers: Number.isFinite(minplayers) ? minplayers : null,
        maxplayers: Number.isFinite(maxplayers) ? maxplayers : null,
        timeMinutes: row.time_minutes === null || row.time_minutes === undefined || row.time_minutes === ''
          ? null
          : Number.isFinite(timeMinutes) ? timeMinutes : null
      };
    }

    async function loadGames() {
      spinButton.disabled = true;
      resultDisplay.textContent = 'Loading games...';
      setSlotMessage('Loading games...');

      if (supabase) {
        const { data, error } = await supabase
          .from('games')
          .select('id,name,players,minplayers,maxplayers,time_minutes')
          .order('name', { ascending: true });

        if (error) {
          console.error('Unable to load games', error);
          resultDisplay.textContent = 'Could not load games from database.';
          setSlotMessage('Using built-in game list.');
        } else {
          const loadedGames = (data || [])
            .map(normalizeGame)
            .filter(game => game.name);
          if (loadedGames.length > 0) {
            allGames = loadedGames;
          }
        }
      }

      if (!allGames.length) {
        resultDisplay.textContent = 'No games available.';
        setSlotMessage('No games available.');
        return;
      }

      resultDisplay.textContent = 'Ready to spin';
      updateFilters();
    }

    function matchesPlayerCount(game) {
      if (!Number.isInteger(selectedPlayerCount) || selectedPlayerCount <= 0) {
        return false;
      }

      if (Number.isFinite(game.players)) {
        return selectedPlayerCount === game.players;
      }

      if (Number.isFinite(game.minplayers) && Number.isFinite(game.maxplayers)) {
        return selectedPlayerCount >= game.minplayers && selectedPlayerCount <= game.maxplayers;
      }

      if (Number.isFinite(game.maxplayers)) {
        return selectedPlayerCount <= game.maxplayers;
      }

      if (Number.isFinite(game.minplayers)) {
        return selectedPlayerCount >= game.minplayers;
      }

      return false;
    }

    function matchesTime(game) {
      if (!selectedTimes.length) {
        return false;
      }

      if (game.timeMinutes === null) {
        return selectedTimes.includes('no limit');
      }

      if (game.timeMinutes <= 30 && (selectedTimes.includes('<30') || selectedTimes.includes('<60'))) {
        return true;
      }

      if (game.timeMinutes <= 60 && selectedTimes.includes('<60')) {
        return true;
      }

      return game.timeMinutes > 60 && selectedTimes.includes('no limit');
    }

    function getFilteredGames() {
      return allGames.filter(game => matchesPlayerCount(game) && matchesTime(game));
    }

    function updateFilters() {
      const rawValue = playerCountInput.value.trim();
      selectedPlayerCount = rawValue === '' ? null : Number(rawValue);
      selectedTimes = Array.from(document.querySelectorAll('.filter-group:nth-of-type(2) input:checked')).map(input => input.value);

      if (!Number.isInteger(selectedPlayerCount) || selectedPlayerCount <= 0) {
        spinButton.disabled = true;
        setSlotMessage('Enter a valid player count.');
        resultDisplay.textContent = 'No games available.';
        return;
      }

      if (!selectedTimes.length) {
        spinButton.disabled = true;
        setSlotMessage('Select at least one time filter.');
        resultDisplay.textContent = 'No games available.';
        return;
      }

      const hasResults = getFilteredGames().length > 0;
      spinButton.disabled = isSpinning || !hasResults;
      if (!isSpinning && allGames.length > 0 && !hasResults) {
        setSlotMessage('No games match those filters.');
        resultDisplay.textContent = 'No games available.';
      } else if (!isSpinning && allGames.length > 0 && hasResults) {
        const filteredCount = getFilteredGames().length;
        setSlotMessage(`${filteredCount} game(s) available. Press Spin.`);
        resultDisplay.textContent = 'Ready to spin';
      }
    }

    filterInputs.forEach(input => {
      input.addEventListener('change', updateFilters);
      input.addEventListener('input', updateFilters);
    });

    function getRandomColorByOdds() {
      // Pick a color based on CS2 case odds; normalize to protect against rounding
      const entries = Object.entries(cs2Odds);
      const total = entries.reduce((s, [, v]) => s + v, 0);
      const roll = Math.random() * total;
      let cumulative = 0;
      for (const [color, odds] of entries) {
        cumulative += odds;
        if (roll <= cumulative) return color;
      }
      return entries[entries.length - 1][0];
    }

    function getRandomColor() {
      // For the spinning tiles, pick a random color with equal distribution
      return slotColors[Math.floor(Math.random() * slotColors.length)];
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    // buildSlot now accepts optional resultColor and selectedIndex so
    // we can ensure the landing tile shows the chosen rarity
    function buildSlot(names, resultColor = null, selectedIndex = 0) {
      slotTrack.innerHTML = '';
      if (!names || names.length === 0) {
        const messageEl = document.createElement('div');
        messageEl.className = 'no-names';
        messageEl.textContent = 'Choose filters, then press Spin.';
        slotTrack.appendChild(messageEl);
        return;
      }
      const loopCount = 4;
      const repeatCount = loopCount + 2;
      const repeatedNames = Array.from({ length: repeatCount }, () => names).flat();

      // Determine how many tiles of each rarity we should have (deterministic rounding)
      const tileCount = repeatedNames.length;
      const entries = Object.entries(cs2Odds);
      const totalOdds = entries.reduce((s, [, v]) => s + v, 0);
      const rawCounts = entries.map(([color, odds]) => ({
        color,
        raw: (odds / totalOdds) * tileCount,
        count: Math.floor((odds / totalOdds) * tileCount)
      }));
      let assigned = rawCounts.reduce((s, r) => s + r.count, 0);
      // distribute remaining slots by highest fractional remainder
      const remainders = rawCounts.map(r => ({ color: r.color, frac: r.raw - r.count }));
      remainders.sort((a, b) => b.frac - a.frac);
      let rem = tileCount - assigned;
      for (let i = 0; i < rem; i++) {
        const c = remainders[i % remainders.length].color;
        const rc = rawCounts.find(r => r.color === c);
        rc.count += 1;
      }

      // Build color list and shuffle for visual distribution
      const colorKeysPerTile = [];
      rawCounts.forEach(r => {
        for (let i = 0; i < r.count; i++) colorKeysPerTile.push(r.color);
      });
      shuffleArray(colorKeysPerTile);

      // Compute landing index within repeatedNames and force that tile to the resultColor
      const targetIndex = names.length + selectedIndex + loopCount * names.length;
      if (resultColor && targetIndex >= 0 && targetIndex < colorKeysPerTile.length) {
        colorKeysPerTile[targetIndex] = resultColor;
      }

      repeatedNames.forEach((game, index) => {
        const item = document.createElement('div');
        item.className = 'slot-item';
        item.textContent = game.name;
        const colorKey = colorKeysPerTile[index] || slotColors[Math.floor(Math.random() * slotColors.length)];
        const bg = slotColorMap[colorKey] || colorKey;
        item.style.background = bg;
        item.style.color = (colorKey === 'gold') ? '#000' : '#fff';
        slotTrack.appendChild(item);
      });

      const items = slotTrack.querySelectorAll('.slot-item');
      if (items.length < 2) return;
      const itemWidth = items[0].offsetWidth + parseFloat(getComputedStyle(items[0]).marginRight) * 2;
      const containerWidth = slotTrack.parentElement.clientWidth;
      const initialIndex = names.length;
      const offset = containerWidth / 2 - itemWidth / 2 - initialIndex * itemWidth;

      slotTrack.style.transition = 'none';
      slotTrack.style.transform = `translateX(${offset}px)`;
      slotTrack.dataset.itemWidth = String(itemWidth);
    }

    function spinSlot() {
      if (isSpinning) return;
      const names = getFilteredGames();
      if (names.length === 0) {
        resultDisplay.textContent = 'No games available.';
        return;
      }
      isSpinning = true;
      spinButton.textContent = 'Spinning...';
      spinButton.disabled = true;

      // Determine the result BEFORE animating: pick color by CS2 odds and name with equal odds
      const resultColor = getRandomColorByOdds();
      const selectedIndex = Math.floor(Math.random() * names.length);
      const selectedName = names[selectedIndex].name;

      buildSlot(names, resultColor, selectedIndex);
      const itemWidth = parseFloat(slotTrack.dataset.itemWidth) || 240;
      const containerWidth = slotTrack.parentElement.clientWidth;
      const loopCount = 4;
      const targetIndex = names.length + selectedIndex + loopCount * names.length;
      const targetOffset = containerWidth / 2 - itemWidth / 2 - targetIndex * itemWidth;

      slotTrack.style.transition = `transform ${spinDuration}ms cubic-bezier(0.22, 1, 0.36, 1)`;
      requestAnimationFrame(() => {
        slotTrack.style.transform = `translateX(${targetOffset}px)`;
      });

      window.setTimeout(() => {
        resultDisplay.textContent = selectedName;
        showPopup(selectedName, resultColor);
        spinButton.textContent = 'Spin';
        isSpinning = false;
        spinButton.disabled = getFilteredGames().length === 0;
      }, spinDuration + 50);
    }

    function showPopup(name, colorKey) {
      const modal = document.getElementById('popupModal');
      const popupName = document.getElementById('popupName');
      const modalBox = modal.querySelector('.modal');
      popupName.textContent = name;
      const bg = slotColorMap[colorKey] || colorKey || 'rgba(10,10,22,0.96)';
      modalBox.style.background = bg;
      modalBox.style.color = (colorKey === 'gold') ? '#000' : '#fff';
      // Style the popup name with colored background
      popupName.style.background = bg;
      popupName.style.color = (colorKey === 'gold') ? '#000' : '#fff';
      popupName.style.padding = '0.8rem 1.2rem';
      popupName.style.borderRadius = '12px';
      popupName.style.display = 'inline-block';
      // set overlay to a semi-transparent color matching the slot
      const overlayBg = overlayColorMap[colorKey] || 'rgba(0,0,0,0.72)';
      modal.style.background = overlayBg;
      modal.classList.add('show');
    }

    function hidePopup() {
      const modal = document.getElementById('popupModal');
      const modalBox = modal.querySelector('.modal');
      const popupName = document.getElementById('popupName');
      modal.classList.remove('show');
      // clear inline styles so next popup uses fresh values
      modal.style.background = '';
      modalBox.style.background = '';
      modalBox.style.color = '';
      popupName.style.background = '';
      popupName.style.color = '';
      popupName.style.padding = '';
      popupName.style.borderRadius = '';
      popupName.style.display = '';
    }

    document.getElementById('closePopup').addEventListener('click', hidePopup);
    document.getElementById('popupModal').addEventListener('click', (event) => {
      if (event.target === event.currentTarget) {
        hidePopup();
      }
    });

    spinButton.addEventListener('click', spinSlot);

    initPage();
  </script>
</body>
</html>
