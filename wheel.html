<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name Spinner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020001;
      --panel: rgba(0, 255, 255, 0.08);
      --accent: #00ffff;
      --accent-2: #ff39ff;
      --text: #ffffff;
      --glow: rgba(0, 255, 255, 0.18);
      --panel-border: rgba(0, 255, 255, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Lucida Console", "Courier New", monospace;
      background: radial-gradient(circle at 20% 10%, #200018 0%, #000 40%), #020001;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 100% 26px;
      pointer-events: none;
      opacity: 0.12;
    }

    .page {
      position: relative;
      width: min(100%, 980px);
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.68);
      border: 2px solid rgba(0, 255, 255, 0.18);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.08);
      border-radius: 18px;
      z-index: 1;
    }

    .glitch-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .glitch {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 4rem);
      letter-spacing: 0.24em;
      color: #e8ff00;
      position: relative;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.25);
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      top: 0;
      overflow: hidden;
    }

    .glitch::before {
      color: #ff00ff;
      clip-path: polygon(0 0, 100% 0, 100% 38%, 0 48%);
      animation: glitchTop 2.2s infinite linear alternate-reverse;
    }

    .glitch::after {
      color: #00ffff;
      clip-path: polygon(0 58%, 100% 48%, 100% 100%, 0 100%);
      animation: glitchBottom 1.7s infinite linear alternate-reverse;
    }

    @keyframes glitchTop {
      0% { transform: translate(2px, -2px); }
      100% { transform: translate(-2px, 2px); }
    }

    @keyframes glitchBottom {
      0% { transform: translate(-2px, 2px); }
      100% { transform: translate(2px, -2px); }
    }

    .sub {
      margin: 0.6rem auto 0;
      color: #cbd5ff;
      letter-spacing: 0.08em;
      max-width: 640px;
    }

    .slot-frame {
      position: relative;
      width: min(100%, 640px);
      height: 220px;
      margin: 0 auto 1.5rem;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .slot-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 0 60px rgba(0,255,255,0.08);
      pointer-events: none;
    }

    .slot-window {
      position: relative;
      width: 100%;
      height: 120px;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,255,255,0.18);
      box-shadow: inset 0 0 30px rgba(0,255,255,0.08);
    }

    .slot-track {
      display: flex;
      align-items: center;
      height: 100%;
      transition: transform 4s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .slot-item {
      min-width: 190px;
      padding: 1rem 1.2rem;
      margin: 0 0.35rem;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-highlight {
      position: absolute;
      inset: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      border-left: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
      pointer-events: none;
      box-shadow: 0 0 40px rgba(0,255,255,0.12);
    }

    .controls {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: 1fr auto;
      align-items: center;
      margin-bottom: 1rem;
    }

    .controls input,
    .controls button {
      font: inherit;
      padding: 0.95rem 1rem;
      border: 1px solid rgba(0,255,255,0.35);
      border-radius: 12px;
      background: rgba(0,0,0,0.4);
      color: var(--text);
      outline: none;
    }

    .controls button {
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .controls button:hover {
      transform: translateY(-1px);
      background: rgba(0,255,255,0.15);
    }

    .controls input {
      min-width: 0;
    }

    .result-card {
      padding: 1rem;
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel);
      text-align: center;
    }

    .result-card strong {
      display: block;
      margin-top: 0.65rem;
      font-size: 1.7rem;
      letter-spacing: 0.12em;
      color: #fff;
    }

    .note,
    .return {
      text-align: center;
      margin-top: 1rem;
      color: #a7f4ff;
    }

    .return a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dotted rgba(0,255,255,0.6);
    }

    .return a:hover {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="glitch-header">
      <h1 class="glitch" data-text="NAME SPINNER">NAME SPINNER</h1>
      <p class="sub">Spin the slot to choose a random name from the list.</p>
    </header>

    <div class="slot-frame" aria-label="Horizontal slot name spinner">
      <div class="slot-window">
        <div id="slotTrack" class="slot-track" aria-live="polite"></div>
        <div class="slot-highlight" aria-hidden="true"></div>
      </div>
    </div>

    <div class="controls">
      <button id="spin" type="button">Spin</button>
    </div>

    <div class="result-card">
      <p>Selected name:</p>
      <strong id="result">Ready to spin</strong>
    </div>

    <p class="note">Press spin to choose from the fixed name list.</p>
    <p class="return"><a href="index.html">&laquo; Back to home</a></p>
  </div>

  <script>
    const defaultNames = [
      'Lethal Company',
      'Lockdown protocol',
      'RV there yet',
      'Goofy Gorillas',
      'Super battle golf',
      'CS2 Office',
      'Buckshot Roulette',
      'Peak'
    ];
    const spinButton = document.getElementById('spin');
    const resultDisplay = document.getElementById('result');
    const slotTrack = document.getElementById('slotTrack');
    let names = [...defaultNames];
    let isSpinning = false;
    const spinDuration = 4200;

    function buildSlot() {
      slotTrack.innerHTML = '';
      const repeatedNames = [...names, ...names, ...names];
      repeatedNames.forEach((name) => {
        const item = document.createElement('div');
        item.className = 'slot-item';
        item.textContent = name;
        slotTrack.appendChild(item);
      });

      const items = slotTrack.querySelectorAll('.slot-item');
      if (items.length < 2) return;
      const itemWidth = items[1].getBoundingClientRect().left - items[0].getBoundingClientRect().left;
      const containerWidth = slotTrack.parentElement.clientWidth;
      const initialIndex = names.length;
      const offset = containerWidth / 2 - itemWidth / 2 - initialIndex * itemWidth;

      slotTrack.style.transition = 'none';
      slotTrack.style.transform = `translateX(${offset}px)`;
      slotTrack.dataset.itemWidth = String(itemWidth);
    }

    function spinSlot() {
      if (isSpinning) return;
      if (names.length === 0) {
        resultDisplay.textContent = 'No names available.';
        return;
      }
      isSpinning = true;
      spinButton.textContent = 'Spinning...';
      spinButton.disabled = true;

      const selectedIndex = Math.floor(Math.random() * names.length);
      const itemWidth = parseFloat(slotTrack.dataset.itemWidth) || 220;
      const containerWidth = slotTrack.parentElement.clientWidth;
      const targetIndex = names.length + selectedIndex;
      const targetOffset = containerWidth / 2 - itemWidth / 2 - targetIndex * itemWidth;

      slotTrack.style.transition = `transform ${spinDuration}ms cubic-bezier(0.22, 1, 0.36, 1)`;
      requestAnimationFrame(() => {
        slotTrack.style.transform = `translateX(${targetOffset}px)`;
      });

      window.setTimeout(() => {
        resultDisplay.textContent = names[selectedIndex];
        spinButton.textContent = 'Spin';
        spinButton.disabled = false;
        isSpinning = false;
        buildSlot();
      }, spinDuration + 50);
    }

    spinButton.addEventListener('click', spinSlot);

    buildSlot();
  </script>
</body>
</html>
