<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faith</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: #f5e9c8;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
        url("faith/Mosaic_from_Daphni_Monastery_in_Greece.jpg") center / cover no-repeat fixed;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1rem;
      position: relative;
      z-index: 2;
    }

    header h1 {
      margin: 0;
      font-size: 3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    }

    header p {
      margin-top: 0.5rem;
      font-style: italic;
      opacity: 0.9;
    }

    .gallery {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 200px);
      padding-bottom: 8rem;
    }

    .gallery figure {
      position: absolute;
      margin: 0;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(245, 233, 200, 0.25);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      transition: transform 0.4s ease, filter 0.6s ease, z-index 0s;
    }

    .gallery figure:hover {
      z-index: 100;
      transform: scale(1.05) rotate(0deg) !important;
    }

    .gallery img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery figcaption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      text-align: center;
      letter-spacing: 0.05em;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gallery figure:hover figcaption {
      opacity: 1;
    }

    .audio-frame {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      width: 320px;
      height: 180px;
      border: 1px solid rgba(245, 233, 200, 0.4);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      background: #000;
      z-index: 1000;
    }

    .audio-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 6px;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 2rem; }
      .audio-frame { width: 220px; height: 124px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Faith</h1>
    <p>Reflections across traditions</p>
  </header>

  <section class="gallery" id="gallery"></section>

  <div class="audio-frame" aria-label="Background audio">
    <iframe
      src="https://www.youtube.com/embed/z96qe75LOF8?autoplay=1&loop=1&playlist=z96qe75LOF8&rel=0"
      title="Faith background audio"
      allow="autoplay; encrypted-media"
      allowfullscreen></iframe>
  </div>

  <script>
    ;(() => {
      const images = [
        { src: 'faith/Mosaic_from_Daphni_Monastery_in_Greece.jpg', caption: 'Mosaic — Daphni Monastery, Greece' },
        { src: 'faith/Christ-Monastery-of-Saint-Catherine-at-Mount-Sinai-6th-century.jpg', caption: "Christ — Saint Catherine's Monastery, Mount Sinai (6th c.)" },
        { src: 'faith/Isfahan_Lotfollah_mosque_ceiling_symmetric.jpg', caption: 'Sheikh Lotfollah Mosque Ceiling — Isfahan' },
        { src: 'faith/Shakyamuni_Buddha_-_Google_Art_Project.jpg', caption: 'Shakyamuni Buddha' }
      ]

      const rand = (min, max) => Math.random() * (max - min) + min
      const pick = arr => arr[Math.floor(Math.random() * arr.length)]

      const effects = [
        () => `hue-rotate(${Math.floor(rand(0, 360))}deg) saturate(${rand(1.2, 2.5).toFixed(2)})`,
        () => `grayscale(1) contrast(${rand(1.1, 1.8).toFixed(2)})`,
        () => `sepia(1) saturate(${rand(1.5, 3).toFixed(2)}) hue-rotate(${Math.floor(rand(-40, 40))}deg)`,
        () => `invert(1) hue-rotate(${Math.floor(rand(0, 360))}deg)`,
        () => `blur(${rand(1, 3).toFixed(1)}px) brightness(${rand(1.1, 1.5).toFixed(2)})`,
        () => `contrast(${rand(1.5, 2.5).toFixed(2)}) brightness(${rand(0.8, 1.3).toFixed(2)})`,
        () => `saturate(0) brightness(${rand(0.7, 1.2).toFixed(2)}) contrast(${rand(1.3, 2).toFixed(2)})`,
        () => `hue-rotate(${Math.floor(rand(0, 360))}deg) invert(${rand(0.2, 0.6).toFixed(2)})`,
        () => `drop-shadow(0 0 ${Math.floor(rand(8, 24))}px ${pick(['#f5e9c8', '#7ad7ff', '#ff7ad0', '#a0ffb0'])}) saturate(${rand(1.2, 2).toFixed(2)})`,
        () => `sepia(${rand(0.6, 1).toFixed(2)}) contrast(${rand(1.2, 1.8).toFixed(2)})`
      ]

      const blendModes = ['normal', 'normal', 'normal', 'multiply', 'screen', 'overlay', 'difference', 'color-dodge', 'hard-light']

      const gallery = document.getElementById('gallery')

      const layout = () => {
        gallery.innerHTML = ''
        const rect = gallery.getBoundingClientRect()
        const galleryW = rect.width
        const galleryH = Math.max(rect.height, window.innerHeight - 200)

        images.forEach((item, i) => {
          const fig = document.createElement('figure')
          const img = document.createElement('img')
          const cap = document.createElement('figcaption')

          img.src = item.src
          img.alt = item.caption
          cap.textContent = item.caption

          const w = Math.floor(rand(180, 360))
          const h = Math.floor(w * rand(0.7, 1.3))
          const left = Math.floor(rand(0, Math.max(0, galleryW - w)))
          const top = Math.floor(rand(0, Math.max(0, galleryH - h)))
          const rot = rand(-15, 15).toFixed(2)
          const z = Math.floor(rand(1, 50))

          fig.style.width = w + 'px'
          fig.style.height = h + 'px'
          fig.style.left = left + 'px'
          fig.style.top = top + 'px'
          fig.style.transform = `rotate(${rot}deg)`
          fig.style.zIndex = z

          img.style.filter = pick(effects)()
          img.style.mixBlendMode = pick(blendModes)

          fig.appendChild(img)
          fig.appendChild(cap)
          gallery.appendChild(fig)
        })
      }

      layout()
      window.addEventListener('resize', layout)
    })()
  </script>
</body>
</html>
